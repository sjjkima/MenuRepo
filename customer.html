<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Menu — TableOrder</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0f0e0c;
    --surface: #1a1916;
    --surface2: #242220;
    --border: #2e2c29;
    --accent: #e8a838;
    --accent2: #c4873a;
    --text: #f0ece4;
    --muted: #7a7570;
    --success: #4caf7d;
    --danger: #e05c5c;
    --card-bg: #1e1c19;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding-bottom: 200px;
  }

  /* HEADER */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header-logo {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    color: var(--accent);
    letter-spacing: -0.5px;
  }
  .table-badge {
    background: var(--accent);
    color: #0f0e0c;
    font-size: 12px;
    font-weight: 600;
    padding: 4px 12px;
    border-radius: 20px;
    letter-spacing: 0.5px;
  }

  /* HERO */
  .hero {
    background: linear-gradient(135deg, #1a1916 0%, #242018 100%);
    padding: 28px 20px 20px;
    border-bottom: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 200px; height: 200px;
    background: radial-gradient(circle, rgba(232,168,56,0.08) 0%, transparent 70%);
    border-radius: 50%;
  }
  .hero h1 {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 4px;
  }
  .hero p { color: var(--muted); font-size: 14px; }

  /* CATEGORY TABS */
  .tabs {
    display: flex;
    gap: 8px;
    padding: 16px 20px;
    overflow-x: auto;
    scrollbar-width: none;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 60px;
    z-index: 90;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    flex-shrink: 0;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 7px 16px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
  }
  .tab.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #0f0e0c;
    font-weight: 600;
  }

  /* SECTION */
  .section { padding: 20px; }
  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    color: var(--text);
    margin-bottom: 16px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }

  /* MENU GRID */
  .menu-grid {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  /* MENU CARD */
  .menu-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px;
    transition: border-color 0.2s, transform 0.15s;
    position: relative;
    overflow: hidden;
  }
  .menu-card.in-cart {
    border-color: var(--accent);
  }
  .menu-card.in-cart::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--accent);
  }
  .menu-emoji {
    width: 60px;
    height: 60px;
    background: var(--surface2);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    flex-shrink: 0;
  }
  .menu-info { flex: 1; }
  .menu-name {
    font-weight: 600;
    font-size: 15px;
    color: var(--text);
    margin-bottom: 3px;
  }
  .menu-desc {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.4;
    margin-bottom: 6px;
  }
  .menu-price {
    font-size: 14px;
    font-weight: 600;
    color: var(--accent);
  }
  .menu-controls {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  .qty-btn {
    width: 32px; height: 32px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-size: 18px;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    font-family: 'DM Sans', sans-serif;
  }
  .qty-btn:hover { background: var(--accent); border-color: var(--accent); color: #0f0e0c; }
  .qty-btn.add-btn {
    background: var(--accent);
    border-color: var(--accent);
    color: #0f0e0c;
    width: 36px; height: 36px;
    font-size: 20px;
  }
  .qty-display {
    font-size: 15px;
    font-weight: 600;
    min-width: 20px;
    text-align: center;
  }
  .tag {
    display: inline-block;
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 4px;
    margin-right: 4px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }
  .tag-veg { background: rgba(76,175,125,0.15); color: #4caf7d; }
  .tag-spicy { background: rgba(224,92,92,0.15); color: #e05c5c; }
  .tag-pop { background: rgba(232,168,56,0.15); color: var(--accent); }

  /* CART BOTTOM SHEET */
  .cart-sheet {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 16px 20px;
    z-index: 200;
    box-shadow: 0 -20px 60px rgba(0,0,0,0.5);
  }
  .cart-summary {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .cart-count {
    font-size: 14px;
    color: var(--muted);
  }
  .cart-total {
    font-size: 20px;
    font-weight: 700;
    color: var(--accent);
    font-family: 'Playfair Display', serif;
  }
  .cart-items-preview {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 12px;
    max-height: 60px;
    overflow-y: auto;
  }
  .cart-pill {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 10px;
    font-size: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .cart-pill-name { color: var(--text); }
  .cart-pill-qty { color: var(--accent); font-weight: 600; }
  .order-btn {
    width: 100%;
    background: var(--accent);
    color: #0f0e0c;
    border: none;
    border-radius: 14px;
    padding: 16px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    letter-spacing: 0.3px;
    transition: all 0.2s;
  }
  .order-btn:hover { background: var(--accent2); transform: translateY(-1px); }
  .order-btn:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; transform: none; }
  .empty-cart {
    text-align: center;
    color: var(--muted);
    font-size: 14px;
    padding: 8px 0;
  }

  /* SUCCESS OVERLAY */
  .success-overlay {
    position: fixed;
    inset: 0;
    background: rgba(15,14,12,0.95);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 999;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
    text-align: center;
    padding: 40px;
  }
  .success-overlay.show {
    opacity: 1;
    pointer-events: all;
  }
  .success-icon {
    width: 80px; height: 80px;
    background: rgba(76,175,125,0.15);
    border: 2px solid var(--success);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    margin-bottom: 24px;
    animation: popIn 0.4s ease;
  }
  @keyframes popIn {
    0% { transform: scale(0.5); opacity: 0; }
    80% { transform: scale(1.1); }
    100% { transform: scale(1); opacity: 1; }
  }
  .success-title {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    color: var(--text);
    margin-bottom: 8px;
  }
  .success-sub { color: var(--muted); font-size: 15px; line-height: 1.5; }
  .success-order-badge {
    margin-top: 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 24px;
    font-size: 14px;
    color: var(--muted);
  }
  .success-order-badge strong { color: var(--accent); font-size: 20px; display: block; }
  .new-order-btn {
    margin-top: 32px;
    background: transparent;
    border: 1.5px solid var(--accent);
    color: var(--accent);
    border-radius: 12px;
    padding: 12px 32px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
  }
  .new-order-btn:hover { background: var(--accent); color: #0f0e0c; }

  /* LOADING */
  .loading {
    text-align: center;
    padding: 40px;
    color: var(--muted);
    font-size: 14px;
  }

  @media (min-width: 480px) {
    .section { padding: 20px 24px; }
    .menu-grid { gap: 14px; }
  }
</style>
</head>
<body>

<header class="header">
  <div class="header-logo">🍽 TableOrder</div>
  <div class="table-badge" id="tableBadge">Table —</div>
</header>

<div class="hero">
  <h1>Today's Menu</h1>
  <p id="heroSub">Loading menu...</p>
</div>

<div class="tabs" id="tabsBar"></div>

<div id="menuContent"></div>

<!-- Cart Sheet -->
<div class="cart-sheet" id="cartSheet">
  <div id="emptyCart" class="empty-cart">Your cart is empty — add items to get started</div>
  <div id="cartFull" style="display:none">
    <div class="cart-summary">
      <span class="cart-count" id="cartCount">0 items</span>
      <span class="cart-total" id="cartTotal">Rs. 0</span>
    </div>
    <div class="cart-items-preview" id="cartPreview"></div>
    <button class="order-btn" id="orderBtn" onclick="placeOrder()">Place Order</button>
  </div>
</div>

<!-- Success Overlay -->
<div class="success-overlay" id="successOverlay">
  <div class="success-icon">✓</div>
  <div class="success-title">Order Placed!</div>
  <div class="success-sub">Your order has been sent to the kitchen.<br/>Sit back and relax 🍽</div>
  <div class="success-order-badge">
    <span>Order ID</span>
    <strong id="successOrderId">#0000</strong>
  </div>
  <button class="new-order-btn" onclick="resetOrder()">＋ Order More Items</button>
</div>

<script>
const API = (window.API_BASE || 'http://localhost:8000');

// ── Menu Data ────────────────────────────────────────────────────────────────
const MENU = {
  "Starters": [
    { id:1, name:"Chicken Momo", price:180, emoji:"🥟", desc:"Steamed dumplings with spiced chicken filling", tags:["spicy"] },
    { id:2, name:"Veg Momo", price:140, emoji:"🥟", desc:"Steamed dumplings with mixed vegetable filling", tags:["veg"] },
    { id:3, name:"Chicken Chilly", price:220, emoji:"🌶", desc:"Crispy chicken with bell peppers & soy sauce", tags:["spicy","pop"] },
    { id:4, name:"Spring Rolls", price:160, emoji:"🌯", desc:"Crispy rolls with vegetable filling", tags:["veg"] },
  ],
  "Main Course": [
    { id:5, name:"Dal Bhat Set", price:250, emoji:"🍛", desc:"Rice, lentil soup, seasonal vegetables & pickle", tags:["veg","pop"] },
    { id:6, name:"Chicken Thakali", price:320, emoji:"🍗", desc:"Traditional Thakali set with chicken curry", tags:["pop"] },
    { id:7, name:"Mutton Curry", price:380, emoji:"🥩", desc:"Slow-cooked mutton in Nepali spices", tags:["spicy"] },
    { id:8, name:"Paneer Butter Masala", price:280, emoji:"🧀", desc:"Creamy tomato sauce with soft paneer cubes", tags:["veg"] },
    { id:9, name:"Fried Rice", price:200, emoji:"🍚", desc:"Wok-tossed rice with vegetables and egg", tags:["pop"] },
    { id:10, name:"Chowmein", price:180, emoji:"🍜", desc:"Stir-fried noodles with vegetables", tags:["veg"] },
  ],
  "Beverages": [
    { id:11, name:"Masala Tea", price:60, emoji:"☕", desc:"Spiced milk tea with ginger & cardamom", tags:["veg","pop"] },
    { id:12, name:"Cold Coffee", price:120, emoji:"🧋", desc:"Chilled coffee with milk and ice cream", tags:["pop"] },
    { id:13, name:"Lassi", price:100, emoji:"🥛", desc:"Thick yogurt drink — sweet or salty", tags:["veg"] },
    { id:14, name:"Fresh Juice", price:140, emoji:"🍊", desc:"Seasonal fresh-pressed fruit juice", tags:["veg"] },
  ],
  "Desserts": [
    { id:15, name:"Gulab Jamun", price:80, emoji:"🍮", desc:"Soft milk-solid balls in sugar syrup", tags:["veg"] },
    { id:16, name:"Kheer", price:90, emoji:"🍚", desc:"Creamy rice pudding with cardamom & nuts", tags:["veg"] },
    { id:17, name:"Ice Cream", price:100, emoji:"🍦", desc:"Seasonal scoops — ask your server for flavors", tags:["pop"] },
  ]
};

// ── State ────────────────────────────────────────────────────────────────────
let cart = {};
let tableNumber = 1;

// ── Init ─────────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  const params = new URLSearchParams(window.location.search);
  tableNumber = parseInt(params.get('table')) || 1;
  document.getElementById('tableBadge').textContent = `Table ${tableNumber}`;
  document.getElementById('heroSub').textContent = `Welcome to Table ${tableNumber} — Order at your pace`;
  buildMenu();
  buildTabs();
});

function buildTabs() {
  const bar = document.getElementById('tabsBar');
  const cats = Object.keys(MENU);
  cats.forEach((cat, i) => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (i === 0 ? ' active' : '');
    btn.textContent = cat;
    btn.onclick = () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('section-' + cat)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
    };
    bar.appendChild(btn);
  });
}

function buildMenu() {
  const content = document.getElementById('menuContent');
  content.innerHTML = '';
  Object.entries(MENU).forEach(([cat, items]) => {
    const section = document.createElement('div');
    section.className = 'section';
    section.id = 'section-' + cat;
    section.innerHTML = `<div class="section-title">${cat}</div><div class="menu-grid" id="grid-${cat}"></div>`;
    content.appendChild(section);
    const grid = document.getElementById('grid-' + cat);
    items.forEach(item => {
      grid.appendChild(createCard(item));
    });
  });
}

function createCard(item) {
  const div = document.createElement('div');
  div.className = 'menu-card';
  div.id = 'card-' + item.id;
  const tags = (item.tags || []).map(t => {
    const cls = { veg:'tag-veg', spicy:'tag-spicy', pop:'tag-pop' }[t] || '';
    const labels = { veg:'🌿 Veg', spicy:'🌶 Spicy', pop:'⭐ Popular' };
    return `<span class="tag ${cls}">${labels[t]||t}</span>`;
  }).join('');
  div.innerHTML = `
    <div class="menu-emoji">${item.emoji}</div>
    <div class="menu-info">
      <div class="menu-name">${item.name}</div>
      <div class="menu-desc">${item.desc}</div>
      <div style="margin-bottom:4px">${tags}</div>
      <div class="menu-price">Rs. ${item.price}</div>
    </div>
    <div class="menu-controls" id="ctrl-${item.id}">
      <button class="qty-btn add-btn" onclick="addItem(${item.id})">+</button>
    </div>`;
  return div;
}

function renderControls(id) {
  const ctrl = document.getElementById('ctrl-' + id);
  const card = document.getElementById('card-' + id);
  const qty = cart[id]?.qty || 0;
  if (qty === 0) {
    ctrl.innerHTML = `<button class="qty-btn add-btn" onclick="addItem(${id})">+</button>`;
    card.classList.remove('in-cart');
  } else {
    ctrl.innerHTML = `
      <button class="qty-btn" onclick="removeItem(${id})">−</button>
      <span class="qty-display">${qty}</span>
      <button class="qty-btn add-btn" onclick="addItem(${id})">+</button>`;
    card.classList.add('in-cart');
  }
}

function findItem(id) {
  for (const items of Object.values(MENU)) {
    const found = items.find(i => i.id === id);
    if (found) return found;
  }
  return null;
}

function addItem(id) {
  const item = findItem(id);
  if (!item) return;
  if (!cart[id]) cart[id] = { ...item, qty: 0 };
  cart[id].qty++;
  renderControls(id);
  updateCart();
}

function removeItem(id) {
  if (!cart[id]) return;
  cart[id].qty--;
  if (cart[id].qty <= 0) delete cart[id];
  renderControls(id);
  updateCart();
}

function updateCart() {
  const items = Object.values(cart);
  const total = items.reduce((s, i) => s + i.price * i.qty, 0);
  const count = items.reduce((s, i) => s + i.qty, 0);

  if (count === 0) {
    document.getElementById('emptyCart').style.display = 'block';
    document.getElementById('cartFull').style.display = 'none';
  } else {
    document.getElementById('emptyCart').style.display = 'none';
    document.getElementById('cartFull').style.display = 'block';
    document.getElementById('cartCount').textContent = `${count} item${count>1?'s':''}`;
    document.getElementById('cartTotal').textContent = `Rs. ${total}`;
    const preview = document.getElementById('cartPreview');
    preview.innerHTML = items.map(i => `
      <div class="cart-pill">
        <span class="cart-pill-name">${i.emoji} ${i.name}</span>
        <span class="cart-pill-qty">×${i.qty}</span>
      </div>`).join('');
  }
}

async function placeOrder() {
  const items = Object.values(cart);
  if (items.length === 0) return;
  const btn = document.getElementById('orderBtn');
  btn.disabled = true;
  btn.textContent = 'Sending order...';

  const total = items.reduce((s, i) => s + i.price * i.qty, 0);
  const payload = {
    table: tableNumber,
    items: items.map(i => ({ name: i.name, qty: i.qty, price: i.price })),
    total: total
  };

  try {
    const res = await fetch(`${API}/order`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    const data = await res.json();
    document.getElementById('successOrderId').textContent = '#' + String(data.order_id).padStart(4, '0');
    document.getElementById('successOverlay').classList.add('show');
    // Reset cart state immediately so clicking "Order More" is instant
    cart = {};
    document.querySelectorAll('.menu-card').forEach(c => c.classList.remove('in-cart'));
    Object.values(MENU).flat().forEach(item => {
      const ctrl = document.getElementById('ctrl-' + item.id);
      if (ctrl) ctrl.innerHTML = `<button class="qty-btn add-btn" onclick="addItem(${item.id})">+</button>`;
    });
    updateCart();
  } catch (e) {
    alert('Failed to send order. Please try again.');
    btn.disabled = false;
    btn.textContent = 'Place Order';
  }
}

function resetOrder() {
  document.getElementById('successOverlay').classList.remove('show');
  // Cart is already cleared in placeOrder; just make sure the button is ready
  const btn = document.getElementById('orderBtn');
  if (btn) { btn.disabled = false; btn.textContent = 'Place Order'; }
  // Scroll to top of menu
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
</body>
</html>
