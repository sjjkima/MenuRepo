<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>QR Print Sheet — TableOrder</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #f5f4f0; font-family: 'DM Sans', sans-serif; padding: 24px; }
  .controls {
    background: white;
    border-radius: 14px;
    padding: 20px;
    margin-bottom: 24px;
    display: flex;
    gap: 14px;
    align-items: center;
    flex-wrap: wrap;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  }
  .controls label { font-size: 13px; font-weight: 600; color: #333; }
  .controls input {
    border: 1.5px solid #e0ddd8;
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    width: 80px;
  }
  .btn {
    background: #e8a838;
    color: #0f0e0c;
    border: none;
    padding: 10px 20px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: background 0.15s;
  }
  .btn:hover { background: #c4873a; }
  .btn-print {
    background: #333;
    color: white;
    margin-left: auto;
  }
  .btn-print:hover { background: #111; }

  .qr-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
  }
  .qr-cell {
    background: white;
    border-radius: 14px;
    padding: 20px;
    text-align: center;
    box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }
  .qr-cell-logo {
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 800;
    color: #e8a838;
  }
  .qr-cell img {
    width: 140px;
    height: 140px;
    border: 8px solid white;
    border-radius: 8px;
    background: #f0f0f0;
  }
  .qr-cell-table {
    font-family: 'Syne', sans-serif;
    font-size: 20px;
    font-weight: 800;
    color: #1a1916;
  }
  .qr-cell-sub { font-size: 11px; color: #999; }
  .qr-cell-dl {
    font-size: 12px;
    color: #e8a838;
    text-decoration: none;
    font-weight: 600;
    border: 1.5px solid #e8a838;
    padding: 5px 14px;
    border-radius: 8px;
    transition: all 0.15s;
    cursor: pointer;
    background: transparent;
    font-family: 'DM Sans', sans-serif;
  }
  .qr-cell-dl:hover { background: #e8a838; color: #0f0e0c; }

  @media print {
    .controls { display: none !important; }
    body { padding: 10px; background: white; }
    .qr-cell { box-shadow: none; border: 1px solid #ddd; }
  }
</style>
</head>
<body>

<div class="controls">
  <label>Tables from</label>
  <input type="number" id="fromTable" value="1" min="1"/>
  <label>to</label>
  <input type="number" id="toTable" value="12" min="1" max="100"/>
  <label>Frontend URL</label>
  <input type="text" id="frontendUrl" value="http://localhost:8080" style="width:220px"/>
  <button class="btn" onclick="generate()">Generate</button>
  <button class="btn btn-print" onclick="window.print()">🖨 Print Sheet</button>
</div>

<div class="qr-grid" id="qrGrid"></div>

<script>
const API = window.API_BASE || 'http://localhost:8000';

function generate() {
  const from = parseInt(document.getElementById('fromTable').value) || 1;
  const to   = parseInt(document.getElementById('toTable').value) || 12;
  const base = document.getElementById('frontendUrl').value.trim();
  const grid = document.getElementById('qrGrid');
  grid.innerHTML = '';

  for (let t = from; t <= to; t++) {
    const cell = document.createElement('div');
    cell.className = 'qr-cell';
    cell.innerHTML = `
      <div class="qr-cell-logo">🍽 TableOrder</div>
      <img src="${API}/generate_qr/${t}?base_url=${encodeURIComponent(base)}" alt="QR Table ${t}" onerror="this.style.background='#fee';this.alt='QR load error'"/>
      <div class="qr-cell-table">Table ${t}</div>
      <div class="qr-cell-sub">Scan to view menu & order</div>
      <a class="qr-cell-dl" href="${API}/generate_qr/${t}?base_url=${encodeURIComponent(base)}" download="table_${t}_qr.png">⬇ Download</a>`;
    grid.appendChild(cell);
  }
}

generate();
</script>
</body>
</html>
